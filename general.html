<!-- about template (about.html) - general syntax of html page-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Spider-Man</title>

    <!-- SEO -->
    <meta name="keywords"
        content="About Spider-Man, Spider-Man Universe, Peter Parker, Marvel Hero, Spider-Verse, Spider-Man Fan Page">

    <meta name="description"
        content="Learn more about the Spider-Man universe, its legendary heroes, powerful villains, and the inspiration behind this fan-made Spider-Man experience.">

    <meta name="author" content="Ankit Raj">
    <meta name="robots" content="index, follow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../gallery/spidylogo.png">

    <!-- your website link-->
    <link rel="canonical" href="https://yourwebsite.com/about.html">

    <!-- =========================
            OPEN GRAPH
    ========================= -->

    <meta property="og:type" content="website">

    <!-- your website link-->
    <meta property="og:url" content="https://yourwebsite.com/about.html">

    <meta property="og:title" content="About Spider-Man Universe | Heroes, Stories & Spider-Verse">

    <meta property="og:description"
        content="Discover the story behind the Spider-Man universe and explore iconic characters, legendary moments, and Spider-Verse adventures.">

    <!-- your image link-->
    <meta property="og:image" content="https://yourwebsite.com/images/about-spiderman.jpg">

    <meta property="og:image:alt" content="Spider-Man standing in cinematic Spider-Verse style">

    <meta property="og:image:type" content="image/jpeg">

    <meta property="og:site_name" content="Spider-Man Universe">
    <meta property="og:locale" content="en_US">

    <!-- =========================
            TWITTER
    ========================= -->

    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title" content="About Spider-Man Universe | Spider-Verse Journey">

    <meta name="twitter:description"
        content="Explore the inspiration, characters, and legendary stories of the Spider-Man universe.">

    <!-- your website link-->
    <meta name="twitter:url" content="https://yourwebsite.com/about.html">

    <!-- your image link-->
    <meta name="twitter:image" content="https://yourwebsite.com/images/about-spiderman.jpg">

    <meta name="twitter:image:alt" content="Spider-Man cinematic multiverse artwork">

    <!-- =========================
            JSON-LD
    ========================= -->

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "AboutPage",
  "name": "About Spider-Man Universe",

  "url": "https://yourwebsite.com/about.html",

  "description": "A fan-made page dedicated to Spider-Man stories, characters, and Spider-Verse adventures.",

  "author": {
    "@type": "Person",
    "name": "Ankit Raj"
  }
}
</script>

    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/about.css">

</head>

<body>

</body>

</html>
