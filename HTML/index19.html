<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
document.addEventListener("click", (e) => {

  const centerX = e.clientX;
  const centerY = e.clientY;

  const total = 12; // 👈 number of sides

  for (let i = 0; i < total; i++) {

    const angle = (i / total) * Math.PI * 2; // radians
    const length = 200; // web length

    const web = document.createElement("div");

    web.style.position = "absolute";
    web.style.width = "2px";
    web.style.height = "0px";
    web.style.background = "white";
    web.style.left = centerX + "px";
    web.style.top = centerY + "px";
    web.style.transformOrigin = "top";

    document.body.appendChild(web);

    // rotate according to angle
    web.style.transform = `rotate(${angle}rad)`;

    // outward shoot
    gsap.to(web, {
      height: length,
      duration: 0.3,
      ease: "power2.out",

      onComplete: () => {
        // collapse back
        gsap.to(web, {
          height: 0,
          duration: 0.4,
          ease: "power2.in",
          onComplete: () => web.remove()
        });
      }
    });
  }

});
</script>

</body>
</html>
