<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man | Experience + Web Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: #1a1a1a;
        }

        /* ========== SECTION 1: EXPERIENCE (SPIDERMAN TEXT) ========== */
        #experience-section {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            overflow-x: hidden;
            position: relative;
        }

        #experience-section h1 {
            color: #ff2e2e;
            font-size: 35vw;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            white-space: nowrap;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff3300;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            0% {
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            }
            100% {
                text-shadow: 0 0 30px #ff3300, 0 0 60px #ff5500, 0 0 90px #ff0000;
            }
        }

        /* ========== SECTION 2: WEB COLLECTION (STRING EFFECT) ========== */
        #web-collection {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .web-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
            position: relative;
        }

        .web-container svg {
            width: 90%;
            max-width: 1200px;
            height: auto;
            background: transparent;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.3));
        }

        .web-container svg path {
            stroke: #ff3333;
            stroke-width: 3;
            fill: transparent;
            filter: drop-shadow(0 0 5px #ff0000);
        }

        /* Spider web decorative elements */
        .web-deco {
            position: absolute;
            color: rgba(255,50,50,0.3);
            font-size: 24px;
            pointer-events: none;
        }

        .web-title {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        .web-title span {
            color: #ff4444;
            font-weight: bold;
        }

        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SECTION 1: EXPERIENCE - SPIDERMAN TEXT with scroll pin effect -->
    <div id="experience-section">
        <h1>SPIDERMAN</h1>
    </div>

    <!-- SECTION 2: WEB COLLECTION - Interactive string effect -->
    <div id="web-collection">
        <div class="web-container">
            <svg width="1000" height="200" viewBox="0 0 1000 200" preserveAspectRatio="none">
                <path id="webString" d="M 50 100 Q 500 100 950 100" />
            </svg>
            <div class="web-deco" style="top: 20%; left: 10%;">🕷️</div>
            <div class="web-deco" style="bottom: 25%; right: 12%;">🕸️</div>
            <div class="web-deco" style="top: 50%; right: 5%; font-size: 18px;">✦</div>
        </div>
        <div class="web-title">
            🕸️ <span>WEB COLLECTION</span> | MOVE MOUSE → STRING BENDS | LEAVE → SNAPS BACK 🕷️
        </div>
    </div>

    <div class="scroll-hint">
        ⬇ SCROLL DOWN ⬇
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ========== SECTION 1: SPIDERMAN TEXT SCROLL EFFECT ==========
        gsap.to("#experience-section h1", {
            transform: "translateX(-150%)",
            scrollTrigger: {
                trigger: "#experience-section",
                scroller: "body",
                start: "top 0%",
                end: "top -100%",
                scrub: 2,
                pin: true,
                invalidateOnRefresh: true
            }
        });

        // ========== SECTION 2: WEB COLLECTION - STRING INTERACTION ==========
        const finalPath = "M 50 100 Q 500 100 950 100";
        const webContainer = document.querySelector("#web-collection .web-container");
        const path = document.querySelector("#webString");

        if (webContainer && path) {
            webContainer.addEventListener("mousemove", function(dets) {
                const rect = webContainer.getBoundingClientRect();
                const svgRect = document.querySelector("#web-collection svg").getBoundingClientRect();
                
                // Get relative mouse position within the container
                let mouseX = dets.clientX - rect.left;
                let mouseY = dets.clientY - rect.top;
                
                // Constrain Y to reasonable range for the string
                mouseY = Math.min(Math.max(mouseY, 30), rect.height - 30);
                
                // Create new path with control point at mouse position
                const newPath = `M 50 100 Q ${mouseX} ${mouseY} 950 100`;
                
                gsap.to(path, {
                    attr: { d: newPath },
                    duration: 0.2,
                    ease: "power2.out"
                });
            });

            webContainer.addEventListener("mouseleave", function() {
                gsap.to(path, {
                    attr: { d: finalPath },
                    duration: 0.8,
                    ease: "elastic.out(1, 0.3)"
                });
            });
        }

        // Add subtle pulse to the string
        gsap.to("#webString", {
            stroke: "#ff5555",
            duration: 0.5,
            repeat: -1,
            yoyo: true,
            ease: "power1.inOut"
        });

        console.log("🔥 Experience + Web Collection Ready!");
        console.log("   Section 1: SPIDERMAN text scrolls horizontally");
        console.log("   Section 2: Move mouse over the string to bend it!");
    </script>
</body>
</html>
