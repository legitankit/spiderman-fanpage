<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSAP Pages</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    width:100%;
}

/* PAGE 1 (UPAR) */
#page1{
    height:100vh;
    background:lightblue;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MAIN PAGE */
#page4{
    height:100vh;
    background:rgb(39,39,137);
    overflow:hidden;
    display:flex;
    align-items:center;
}

#page4 h1{
    color:white;
    font-size:40vw;
    white-space:nowrap;
}

/* PAGE 5 (NEECHE) */
#page5{
    height:100vh;
    background:lightgreen;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<!-- UPAR PAGE -->
<div id="page1">
    <h1>PAGE 1</h1>
</div>

<!-- SPIDERMAN EFFECT -->
<div id="page4">
    <h1>SPIDERMAN</h1>
</div>

<!-- NEECHE PAGE -->
<div id="page5">
    <h1>PAGE 5</h1>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

gsap.to("#page4 h1",{
    x:"-150%",
    scrollTrigger:{
        trigger:"#page4",
        start:"top top",
        end:"+=100%",  // 🔥 no extra space
        scrub:2,
        pin:true
    }
});
</script>

</body>
</html>
